services:
  - type: web
    name: stock-picker
    runtime: python
    plan: starter
    autoDeploy: false
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    env:
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:////data/stock_picker.db"
