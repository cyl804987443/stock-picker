<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股选股器 - 每日盘前策略选股</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="top-bar-left">
        <span class="logo">📈 A股选股器</span>
        <span class="subtitle">每日盘前策略选股</span>
      </div>
      <div class="top-bar-right">
        <span class="date-display" id="dateDisplay"></span>
        <span class="countdown" id="countdown"></span>
        <button class="btn-refresh" onclick="loadData()" title="刷新数据">🔄</button>
      </div>
    </header>

    <nav class="date-nav">
      <button class="nav-btn" onclick="changeDate(-1)">‹</button>
      <select id="dateSelect" onchange="onDateChange()"></select>
      <button class="nav-btn" onclick="changeDate(1)">›</button>
      <span class="nav-status" id="navStatus"></span>
      <button class="btn-trigger" onclick="triggerScreening()" id="btnTrigger">⚡ 手动选股</button>
    </nav>

    <section class="data-status" id="dataStatus">
      <span>正在读取全市场数据状态...</span>
    </section>

    <section class="job-progress hidden" id="jobProgress">
      <div class="job-progress-header">
        <strong id="jobStage">准备中</strong>
        <span id="jobNumbers"></span>
      </div>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="job-message" id="jobMessage"></div>
    </section>

    <div class="filter-bar" id="filterBar"></div>

    <main class="content" id="mainContent">
      <div class="loading" id="loading">加载中...</div>
    </main>

    <footer class="footer">
      数据来源：AkShare 聚合真实行情 · 沪深主板 · <strong>不构成投资建议</strong> · 投资有风险
    </footer>
  </div>
  <script src="/app.js?t=1781433000"></script>
</body>
</html>
